Name: IceHost Hourly KeepAlive

on:
  schedule:
    - cron: '0 */6 * * *'  # 🟢 开启自动触发：每 6 小时自动执行一次（北京时间 2点、8点、14点、20点左右）
  workflow_dispatch:       # 🟢 保留手动触发：允许你在网页上随时点击运行

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install seleniumbase requests

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.1

      - name: Run check script
        env:
          ICEHOST_SERVER_URL: ${{ secrets.ICEHOST_SERVER_URL }}
          ICEHOST_COOKIES: ${{ secrets.ICEHOST_COOKIES }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python icehost_run.py

      - name: Upload Debug Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: icehost-debug-screenshot
          path: icehost_debug_screenshot.png
          if-no-files-found: ignore
